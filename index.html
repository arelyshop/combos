<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARELYSHOP VENTAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .skeleton {
            background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }
        @keyframes skeleton-loading { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        #preview-modal { display: none; }
        #preview-modal.active { display: flex; }
        
        #render-canvas {
            max-width: 100%;
            height: auto;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            background-color: white;
            border-radius: 24px;
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .line-through-red { text-decoration: line-through; text-decoration-color: #ef4444; text-decoration-thickness: 2px; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen pb-64">

    <div class="max-w-7xl mx-auto px-4 py-8">
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-black text-gray-900 tracking-tighter uppercase italic">ARELYSHOP VENTAS</h1>
            <p class="text-gray-500 text-sm font-bold tracking-widest uppercase mt-1">Gestor de Inventario & Artes Visuales</p>
        </header>

        <div id="drop-zone" class="mb-10 border-4 border-dashed border-gray-200 rounded-[32px] p-12 text-center transition-all cursor-pointer bg-white hover:border-blue-500 hover:bg-blue-50/30 group shadow-sm">
            <input type="file" id="csv-file" accept=".csv" class="hidden">
            <div class="flex flex-col items-center">
                <div class="bg-blue-600 p-5 rounded-3xl mb-4 shadow-xl shadow-blue-200 group-hover:scale-110 transition-transform">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                    </svg>
                </div>
                <p class="text-xl font-black text-gray-800 uppercase italic">Suelta tu archivo CSV aquí</p>
                <p class="text-[10px] text-gray-400 mt-2 font-bold tracking-[0.2em] uppercase">name • sku • sale_price • discount_price • stock • category</p>
            </div>
        </div>

        <div id="controls" class="hidden flex flex-col space-y-4 mb-8 animate-in fade-in duration-700">
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="search-input" placeholder="Buscar por nombre o SKU..." class="md:col-span-2 px-6 py-4 border-none rounded-2xl bg-white shadow-sm ring-1 ring-gray-200 focus:ring-2 focus:ring-blue-500 outline-none font-semibold text-gray-700">
                <select id="category-filter" class="px-6 py-4 border-none rounded-2xl bg-white shadow-sm ring-1 ring-gray-200 font-bold text-gray-600 outline-none"></select>
                <select id="stock-filter" class="px-6 py-4 border-none rounded-2xl bg-white shadow-sm ring-1 ring-gray-200 font-bold text-gray-600 outline-none">
                    <option value="all">Ver todo el Stock</option>
                    <option value="available">Solo Disponibles</option>
                    <option value="out_of_stock">Solo Agotados</option>
                </select>
            </div>
            
            <div class="flex flex-wrap items-center justify-between gap-4 bg-white p-5 rounded-[24px] border border-gray-100 shadow-sm">
                <div id="stats" class="text-[10px] font-black text-gray-400 uppercase tracking-[0.3em]">Cargando herramientas...</div>
                <div class="flex gap-4 items-center">
                    <button id="export-catalog-btn" class="px-8 py-3 bg-gray-900 text-white text-[10px] font-black rounded-xl hover:bg-black transition-all uppercase tracking-widest shadow-lg active:scale-95">
                        Exportar Catálogo
                    </button>
                    <button id="reset-filters" class="text-[10px] font-black text-gray-400 hover:text-red-500 uppercase tracking-widest transition-colors">Limpiar Filtros</button>
                </div>
            </div>
        </div>

        <div id="status-message" class="hidden p-4 mb-6 rounded-2xl text-center text-xs font-black uppercase tracking-widest shadow-sm border animate-pulse"></div>
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </div>

    <div id="selection-bar" class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-gray-100 shadow-[0_-20px_50px_rgba(0,0,0,0.1)] p-5 transform translate-y-full transition-transform duration-500 z-40">
        <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-10 divide-y lg:divide-y-0 lg:divide-x divide-gray-100">
            
            <div class="py-2 lg:pr-10">
                <div class="flex justify-between items-center mb-4">
                    <div>
                        <h4 class="font-black text-gray-900 text-sm uppercase italic tracking-tighter">Mi Selección</h4>
                        <p class="text-[9px] text-emerald-600 font-black uppercase tracking-widest" id="catalog-count-text">0 ítems seleccionados</p>
                    </div>
                    <button id="clear-catalog" class="text-[9px] font-black text-red-500 uppercase hover:underline tracking-widest">Vaciar Lista</button>
                </div>
                <div id="manual-catalog-preview" class="flex gap-3 overflow-x-auto pb-2 custom-scrollbar min-h-[50px]"></div>
            </div>

            <div class="py-2 lg:pl-10 flex flex-col sm:flex-row items-center gap-8 justify-between">
                <div class="flex items-center gap-4">
                    <div id="combo-items-preview" class="flex -space-x-4"></div>
                    <div>
                        <h4 class="font-black text-gray-900 text-sm uppercase italic tracking-tighter">Configurar Combo</h4>
                        <p class="text-[10px] text-blue-600 font-black uppercase tracking-widest" id="combo-sum-display"></p>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <div class="bg-gray-100 p-3 px-5 rounded-2xl border border-gray-200">
                        <p class="text-[8px] text-gray-500 font-black uppercase mb-1">Precio Especial</p>
                        <div class="flex items-center gap-1">
                            <span class="font-black text-gray-900 text-sm">Bs.</span>
                            <input type="number" id="custom-combo-price" placeholder="..." class="w-24 bg-transparent border-none focus:ring-0 outline-none font-black text-gray-900 text-xl p-0">
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <button id="open-preview-btn" class="hidden px-8 py-3 bg-blue-600 text-white text-[10px] font-black rounded-xl hover:bg-blue-700 transition-all shadow-xl uppercase tracking-widest active:scale-95">
                            Previsualizar
                        </button>
                        <button id="clear-combo-btn" class="hidden text-[9px] font-black text-red-500 uppercase hover:underline text-center">Vaciar Combo</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="preview-modal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-[100] items-center justify-center p-4">
        <div class="bg-white rounded-[40px] max-w-xl w-full overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
            <div class="p-6 border-b flex justify-between items-center bg-gray-50/50">
                <h3 class="font-black text-gray-900 uppercase italic text-sm tracking-tighter">Arte Final - Previsualización</h3>
                <button id="close-modal" class="text-gray-400 hover:text-black p-2 transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
            <div class="p-10 overflow-y-auto flex-grow bg-gray-100 flex justify-center items-start">
                <canvas id="render-canvas"></canvas>
            </div>
            <div class="p-8 bg-white border-t flex flex-col sm:flex-row gap-3">
                <button id="copy-btn" class="flex-1 py-5 bg-emerald-600 text-white font-black rounded-3xl hover:bg-emerald-700 shadow-2xl shadow-emerald-200 uppercase tracking-[0.2em] text-[11px] transition-all active:scale-95">
                    Copiar Imagen
                </button>
                <button id="download-btn" class="flex-1 py-5 bg-blue-600 text-white font-black rounded-3xl hover:bg-blue-700 shadow-2xl shadow-blue-200 uppercase tracking-[0.2em] text-[11px] transition-all active:scale-95">
                    Descargar JPG
                </button>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('csv-file');
        const dropZone = document.getElementById('drop-zone');
        const productGrid = document.getElementById('product-grid');
        const statusMessage = document.getElementById('status-message');
        const controls = document.getElementById('controls');
        const searchInput = document.getElementById('search-input');
        const categoryFilter = document.getElementById('category-filter');
        const stockFilter = document.getElementById('stock-filter');
        const selectionBar = document.getElementById('selection-bar');
        const comboPreview = document.getElementById('combo-items-preview');
        const manualCatalogPreview = document.getElementById('manual-catalog-preview');
        const catalogCountText = document.getElementById('catalog-count-text');
        const comboSumDisplay = document.getElementById('combo-sum-display');
        const customPriceInput = document.getElementById('custom-combo-price');
        const openPreviewBtn = document.getElementById('open-preview-btn');
        const clearComboBtn = document.getElementById('clear-combo-btn');
        const previewModal = document.getElementById('preview-modal');
        const renderCanvas = document.getElementById('render-canvas');
        const ctx = renderCanvas.getContext('2d');
        const closeModal = document.getElementById('close-modal');
        const copyBtn = document.getElementById('copy-btn');
        const downloadBtn = document.getElementById('download-btn');
        const exportCatalogBtn = document.getElementById('export-catalog-btn');
        const statsEl = document.getElementById('stats');

        let allProducts = [];
        let filteredProducts = [];
        let selectedCombo = [];
        let selectedCatalog = [];

        const OFFER_ICON_PATH = "m20.749 12 1.104-1.908a1 1 0 0 0-.365-1.366l-1.91-1.104v-2.2a1 1 0 0 0-1-1h-2.199l-1.103-1.909a1.008 1.008 0 0 0-.607-.466.993.993 0 0 0-.759.1L12 3.251l-1.91-1.105a1 1 0 0 0-1.366.366L7.62 4.422H5.421a1 1 0 0 0-1 1v2.199l-1.91 1.104a.998.998 0 0 0-.365 1.367L3.25 12l-1.104 1.908a1.004 1.004 0 0 0 .364 1.367l1.91 1.104v2.199a1 1 0 0 0 1 1h2.2l1.104 1.91a1.01 1.01 0 0 0 .866.5c.174 0 .347-.046.501-.135l1.908-1.104 1.91 1.104a1.001 1.001 0 0 0 1.366-.365l1.103-1.91h2.199a1 1 0 0 0 1-1v-2.199l1.91-1.104a1 1 0 0 0 .365-1.367L20.749 12zM9.499 6.99a1.5 1.5 0 1 1-.001 3.001 1.5 1.5 0 0 1 .001-3.001zm.3 9.6-1.6-1.199 6-8 1.6 1.199-6 8zm4.7.4a1.5 1.5 0 1 1 .001-3.001 1.5 1.5 0 0 1-.001 3.001z";

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('border-blue-500', 'bg-blue-50'); });
        ['dragleave', 'dragend'].forEach(type => { dropZone.addEventListener(type, () => dropZone.classList.remove('border-blue-500', 'bg-blue-50')); });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('border-blue-500', 'bg-blue-50');
            if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => { if(e.target.files.length) processFile(e.target.files[0]); });

        function cleanPrice(val) {
            if (!val) return 0;
            const cleaned = val.toString().replace(/[^\d.,]/g, '').replace(',', '.');
            return parseFloat(cleaned) || 0;
        }

        function formatCurrency(num) {
            return `Bs. ${new Intl.NumberFormat('es-BO', { minimumFractionDigits: 2 }).format(num)}`;
        }

        function processFile(file) {
            statusMessage.innerText = "PROCESANDO...";
            statusMessage.className = "p-4 mb-6 rounded-2xl text-center text-xs font-black bg-blue-50 text-blue-700 border-blue-100 block";
            
            Papa.parse(file, {
                header: true,
                skipEmptyLines: true,
                transformHeader: h => h.trim().toLowerCase(),
                complete: function(results) {
                    if (results.data && results.data.length > 0) {
                        allProducts = results.data.map(row => {
                            const sp = cleanPrice(row.sale_price);
                            const dp = cleanPrice(row.discount_price);
                            const isOffer = dp > 0 && dp < sp;
                            return {
                                name: (row.name || 'Sin nombre').trim(),
                                sku: (row.sku || 'N/A').trim(),
                                originalPrice: sp,
                                finalPrice: isOffer ? dp : sp,
                                hasOffer: isOffer,
                                stock: parseFloat(row.stock) || 0,
                                category: (row.category || 'General').trim(),
                                image: row.photo_url_1 || ''
                            };
                        });
                        updateCategoryDropdown();
                        applyFilters();
                        controls.classList.remove('hidden');
                        dropZone.classList.add('hidden');
                        statusMessage.innerText = "INVENTARIO CARGADO";
                        statusMessage.className = "p-4 mb-6 rounded-2xl text-center text-xs font-black bg-green-50 text-green-700 border-green-100 block";
                    }
                }
            });
        }

        function updateCategoryDropdown() {
            const categories = [...new Set(allProducts.map(p => p.category))].filter(c => c).sort();
            categoryFilter.innerHTML = '<option value="">Categorías</option>';
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat; opt.innerText = cat;
                categoryFilter.appendChild(opt);
            });
        }

        function applyFilters() {
            const term = searchInput.value.toLowerCase();
            const cat = categoryFilter.value;
            const stockMode = stockFilter.value;
            filteredProducts = allProducts.filter(p => {
                const matchesSearch = p.name.toLowerCase().includes(term) || p.sku.toLowerCase().includes(term);
                const matchesCat = cat === "" || p.category === cat;
                let matchesStock = true;
                if (stockMode === 'available') matchesStock = p.stock > 0;
                if (stockMode === 'out_of_stock') matchesStock = p.stock <= 0;
                return matchesSearch && matchesCat && matchesStock;
            });
            statsEl.innerText = `${filteredProducts.length} ÍTEMS ACTIVOS`;
            renderProducts(filteredProducts);
        }

        function renderProducts(products) {
            productGrid.innerHTML = '';
            products.forEach(p => {
                const inCombo = selectedCombo.some(item => item.sku === p.sku);
                const inCatalog = selectedCatalog.some(item => item.sku === p.sku);
                const isAvail = p.stock > 0;
                const card = document.createElement('div');
                card.className = `bg-white rounded-[32px] border ${inCombo || inCatalog ? 'border-blue-500 ring-4 ring-blue-50' : 'border-gray-100'} overflow-hidden shadow-sm flex flex-col transition-all hover:shadow-xl hover:scale-[1.02]`;
                
                card.innerHTML = `
                    <div class="aspect-square bg-gray-50/50 relative p-6 flex items-center justify-center">
                        <div class="absolute inset-0 skeleton" id="sk-${p.sku}"></div>
                        <img src="${p.image}" loading="lazy" class="max-w-full max-h-full object-contain relative z-10" 
                             onload="document.getElementById('sk-${p.sku}')?.remove();"
                             onerror="this.src='https://placehold.co/400x400/f3f4f6/9ca3af?text=Sin+Imagen';">
                        
                        <div class="absolute top-4 left-4 z-20">
                            <span class="${isAvail ? 'bg-emerald-600' : 'bg-red-600'} text-white text-[9px] font-black px-3 py-1.5 rounded-full uppercase shadow-lg border-2 border-white">${isAvail ? 'Disponible' : 'Agotado'}</span>
                        </div>
                        
                        ${p.hasOffer ? `
                        <div class="absolute top-4 right-4 z-20 text-red-600 animate-pulse bg-white/80 p-1.5 rounded-full shadow-lg">
                            <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="${OFFER_ICON_PATH}"></path></svg>
                        </div>` : ''}
                    </div>
                    <div class="p-6 flex flex-col flex-grow">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[9px] font-black text-blue-600 uppercase tracking-tighter">SKU: ${p.sku}</span>
                            <span class="text-[9px] font-bold text-gray-300 uppercase">${p.category}</span>
                        </div>
                        <h3 class="text-gray-900 font-bold text-[12px] leading-tight line-clamp-2 h-10 mb-4">${p.name}</h3>
                        <div class="mt-auto">
                             <div class="mb-4">
                                ${p.hasOffer ? `<span class="text-[10px] text-red-500 font-black line-through opacity-50 decoration-red-500">${formatCurrency(p.originalPrice)}</span>` : ''}
                                <div class="text-2xl font-black text-gray-900 leading-none">${formatCurrency(p.finalPrice)}</div>
                             </div>
                             <div class="grid grid-cols-2 gap-3">
                                <button onclick="toggleCombo('${p.sku}')" class="py-3 text-[9px] font-black uppercase rounded-2xl border-2 border-blue-600 transition-all ${inCombo ? 'bg-blue-600 text-white shadow-lg' : 'text-blue-600 hover:bg-blue-50'}">+ Combo</button>
                                <button onclick="toggleCatalog('${p.sku}')" class="py-3 text-[9px] font-black uppercase rounded-2xl border-2 border-emerald-600 transition-all ${inCatalog ? 'bg-emerald-600 text-white shadow-lg' : 'text-emerald-600 hover:bg-emerald-50'}">+ Catálogo</button>
                             </div>
                        </div>
                    </div>
                `;
                productGrid.appendChild(card);
            });
        }

        window.toggleCombo = (sku) => {
            const p = allProducts.find(x => x.sku === sku);
            const idx = selectedCombo.findIndex(x => x.sku === sku);
            if (idx > -1) selectedCombo.splice(idx, 1);
            else if (selectedCombo.length < 2) selectedCombo.push(p);
            else alert("Límite alcanzado: El combo solo permite 2 productos.");
            updateUIBars();
        };

        window.toggleCatalog = (sku) => {
            const p = allProducts.find(x => x.sku === sku);
            const idx = selectedCatalog.findIndex(x => x.sku === sku);
            if (idx > -1) selectedCatalog.splice(idx, 1);
            else selectedCatalog.push(p);
            updateUIBars();
        };

        function updateUIBars() {
            if (selectedCombo.length > 0 || selectedCatalog.length > 0) selectionBar.classList.remove('translate-y-full');
            else selectionBar.classList.add('translate-y-full');

            comboPreview.innerHTML = '';
            let sum = 0;
            selectedCombo.forEach(p => {
                sum += p.finalPrice;
                const d = document.createElement('div');
                d.className = "w-12 h-12 bg-white rounded-xl border-2 border-blue-500 p-1 flex items-center justify-center overflow-hidden shadow-lg";
                d.innerHTML = `<img src="${p.image}" class="max-w-full max-h-full object-contain">`;
                comboPreview.appendChild(d);
            });
            comboSumDisplay.innerText = selectedCombo.length > 0 ? `Suma: ${formatCurrency(sum)}` : "";
            openPreviewBtn.classList.toggle('hidden', selectedCombo.length !== 2);
            clearComboBtn.classList.toggle('hidden', selectedCombo.length === 0);

            manualCatalogPreview.innerHTML = '';
            selectedCatalog.forEach(p => {
                const d = document.createElement('div');
                d.className = "flex-shrink-0 w-14 h-14 bg-white rounded-xl border border-emerald-200 p-1 flex items-center justify-center overflow-hidden relative group";
                d.innerHTML = `<img src="${p.image}" class="max-w-full max-h-full object-contain"><button onclick="toggleCatalog('${p.sku}')" class="absolute -top-1 -right-1 bg-red-500 text-white rounded-full p-1 opacity-0 group-hover:opacity-100 transition-opacity"><svg class="w-2 h-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M6 18L18 6M6 6l12 12" stroke-width="4"></path></svg></button>`;
                manualCatalogPreview.appendChild(d);
            });
            catalogCountText.innerText = `${selectedCatalog.length} ítems seleccionados`;
            exportCatalogBtn.innerText = selectedCatalog.length > 0 ? "Exportar Selección" : "Exportar Catálogo";

            renderProducts(filteredProducts);
        }

        clearComboBtn.onclick = () => { selectedCombo = []; customPriceInput.value = ''; updateUIBars(); };
        document.getElementById('clear-catalog').onclick = () => { selectedCatalog = []; updateUIBars(); };
        document.getElementById('reset-filters').onclick = () => { searchInput.value = ''; categoryFilter.value = ''; stockFilter.value = 'all'; applyFilters(); };

        function wrapText(context, text, x, y, maxWidth, lineHeight) {
            const words = text.split(' ');
            let line = '';
            let lineCount = 0;
            for(let n = 0; n < words.length; n++) {
                if (lineCount >= 2) break;
                let testLine = line + words[n] + ' ';
                if (context.measureText(testLine).width > maxWidth && n > 0) {
                    context.fillText(line, x, y);
                    line = words[n] + ' ';
                    y += lineHeight;
                    lineCount++;
                } else { line = testLine; }
            }
            if (lineCount < 2) context.fillText(line, x, y);
        }

        function drawOfferBadge(context, x, y, size) {
            context.save();
            context.translate(x, y);
            context.fillStyle = "#EF4444";
            const p = new Path2D(OFFER_ICON_PATH);
            const scale = size / 24;
            context.scale(scale, scale);
            context.fill(p);
            context.restore();
        }

        async function loadImage(url) {
            return new Promise((resolve) => {
                const img = new Image();
                img.crossOrigin = "anonymous";
                img.onload = () => resolve(img);
                img.onerror = () => resolve(null);
                img.src = url || 'https://placehold.co/400x400/f3f4f6/9ca3af?text=Sin+Imagen';
            });
        }

        async function drawCombo() {
            renderCanvas.width = 1000; renderCanvas.height = 1200;
            ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, 1000, 1200);
            
            ctx.fillStyle = "#111827"; ctx.font = "italic 900 85px Inter"; ctx.textAlign = "center"; ctx.fillText("OFERTA ESPECIAL", 500, 110);
            ctx.fillStyle = "#2563EB"; ctx.fillRect(410, 140, 180, 14);

            const [img1, img2] = await Promise.all([loadImage(selectedCombo[0].image), loadImage(selectedCombo[1].image)]);

            const drawP = (p, img, x, y) => {
                const sz = 480;
                if (img) {
                    const r = Math.min(sz / img.width, sz / img.height);
                    ctx.drawImage(img, x + (sz - img.width * r) / 2, y + (sz - img.height * r) / 2, img.width * r, img.height * r);
                }
                if (p.hasOffer) drawOfferBadge(ctx, x + sz - 80, y + 20, 70);
                
                ctx.textAlign = "center";
                ctx.fillStyle = "#2563EB"; ctx.font = "italic 900 38px Inter"; ctx.fillText(`SKU: ${p.sku}`, x + sz/2, y + 540);
                ctx.fillStyle = "#374151"; ctx.font = "bold 28px Inter"; wrapText(ctx, p.name, x + sz/2, y + 600, sz, 36);
                
                if (p.hasOffer) {
                    // Precio original tachado (Reducido de 32px a 28px)
                    ctx.fillStyle = "#9ca3af"; ctx.font = "bold 28px Inter";
                    const oldTxt = formatCurrency(p.originalPrice);
                    ctx.fillText(oldTxt, x + sz/2, y + 660);
                    const tw = ctx.measureText(oldTxt).width;
                    ctx.strokeStyle = "#EF4444"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(x + sz/2 - tw/2 - 5, y + 652); ctx.lineTo(x + sz/2 + tw/2 + 5, y + 652); ctx.stroke();
                    
                    // Precio oferta (Reducido de 58px a 48px para evitar amontonamiento)
                    ctx.fillStyle = "#EF4444"; ctx.font = "900 48px Inter";
                    ctx.fillText(formatCurrency(p.finalPrice), x + sz/2, y + 715);
                } else {
                    // Precio normal (Reducido de 58px a 48px)
                    ctx.fillStyle = "#111827"; ctx.font = "900 48px Inter"; 
                    ctx.fillText(formatCurrency(p.finalPrice), x + sz/2, y + 710);
                }
            };

            drawP(selectedCombo[0], img1, 15, 220);
            drawP(selectedCombo[1], img2, 505, 220);

            ctx.beginPath(); ctx.arc(500, 460, 65, 0, Math.PI * 2); ctx.fillStyle = "#2563EB"; ctx.fill();
            ctx.fillStyle = "#FFFFFF"; ctx.font = "bold 85px Inter"; ctx.fillText("+", 500, 490);

            const cp = cleanPrice(customPriceInput.value);
            const sumO = selectedCombo.reduce((a,b) => a + b.finalPrice, 0);

            if (cp > 0) {
                ctx.fillStyle = "#9ca3af"; ctx.font = "bold 38px Inter";
                const label = `TOTAL: ${formatCurrency(sumO)}`; ctx.fillText(label, 500, 980);
                const tw = ctx.measureText(label).width;
                ctx.strokeStyle = "#EF4444"; ctx.lineWidth = 5; ctx.beginPath(); ctx.moveTo(500 - tw/2 - 10, 968); ctx.lineTo(500 + tw/2 + 10, 968); ctx.stroke();
            }

            ctx.fillStyle = "#2563EB"; ctx.font = "900 32px Inter"; ctx.fillText("DESCUENTO EN COMBO", 500, 1045);
            ctx.fillStyle = "#f9fafb"; ctx.beginPath(); ctx.roundRect(100, 1065, 800, 110, 30); ctx.fill(); ctx.strokeStyle = "#E5E7EB"; ctx.stroke();
            
            // Precio de combo mediano centrado
            ctx.fillStyle = "#111827"; ctx.font = "900 65px Inter"; ctx.textBaseline = "middle";
            ctx.fillText(formatCurrency(cp > 0 ? cp : sumO), 500, 1120);
            ctx.textBaseline = "alphabetic";

            previewModal.classList.add('active');
        }

        async function drawCatalog() {
            const list = selectedCatalog.length > 0 ? selectedCatalog : filteredProducts;
            if (list.length === 0) return alert("No hay productos seleccionados para exportar.");

            const rH = 750; const hH = 220; const fH = 120;
            const rows = Math.ceil(list.length / 2);
            renderCanvas.width = 1000; renderCanvas.height = hH + (rows * rH) + fH;
            ctx.fillStyle = "#FFFFFF"; ctx.fillRect(0, 0, 1000, renderCanvas.height);

            ctx.fillStyle = "#111827"; ctx.font = "italic 900 70px Inter"; ctx.textAlign = "center"; ctx.fillText("CATÁLOGO DE PRODUCTOS", 500, 110);
            ctx.fillStyle = "#2563EB"; ctx.font = "bold 24px Inter"; ctx.fillText(`${new Date().toLocaleDateString()} | ARELYSHOP.COM`, 500, 155);

            for (let i = 0; i < list.length; i++) {
                const p = list[i]; const col = i % 2; const row = Math.floor(i / 2);
                const x = col === 0 ? 0 : 500; const y = hH + (row * rH); const xC = x + 250; const iSz = 440;
                
                const img = await loadImage(p.image);
                if (img) {
                    const r = Math.min(iSz / img.width, iSz / img.height);
                    ctx.drawImage(img, xC - (img.width * r) / 2, y + 40 + (iSz - img.height * r) / 2, img.width * r, img.height * r);
                }
                if (p.hasOffer) drawOfferBadge(ctx, xC + 160, y + 40, 65);

                ctx.textAlign = "center";
                ctx.fillStyle = "#2563EB"; ctx.font = "italic 900 34px Inter"; ctx.fillText(`SKU: ${p.sku}`, xC, y + 530);
                ctx.fillStyle = "#111827"; ctx.font = "bold 26px Inter"; wrapText(ctx, p.name, xC, y + 575, 460, 34);
                
                if (p.hasOffer) {
                    ctx.fillStyle = "#9ca3af"; ctx.font = "bold 28px Inter";
                    const oldT = formatCurrency(p.originalPrice);
                    ctx.fillText(oldT, xC, y + 640);
                    const tw = ctx.measureText(oldT).width;
                    ctx.strokeStyle = "#EF4444"; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(xC - tw/2 - 5, y + 632); ctx.lineTo(xC + tw/2 + 5, y + 632); ctx.stroke();
                    ctx.fillStyle = "#EF4444"; ctx.font = "900 52px Inter"; ctx.fillText(formatCurrency(p.finalPrice), xC, y + 695);
                } else {
                    ctx.fillStyle = "#111827"; ctx.font = "900 52px Inter"; ctx.fillText(formatCurrency(p.finalPrice), xC, y + 665);
                }
            }

            ctx.fillStyle = "#F9FAFB"; ctx.fillRect(0, renderCanvas.height - fH, 1000, fH);
            ctx.fillStyle = "#9CA3AF"; ctx.font = "bold 20px Inter"; ctx.fillText("ARELYSHOP.COM", 500, renderCanvas.height - 55);
            previewModal.classList.add('active');
        }

        openPreviewBtn.onclick = drawCombo;
        exportCatalogBtn.onclick = drawCatalog;
        closeModal.onclick = () => previewModal.classList.remove('active');
        
        copyBtn.onclick = () => {
            const originalText = copyBtn.innerText;
            copyBtn.innerText = 'COPIANDO...';
            try {
                renderCanvas.toBlob(async (blob) => {
                    try {
                        const item = new ClipboardItem({ 'image/png': blob });
                        await navigator.clipboard.write([item]);
                        copyBtn.innerText = '¡COPIADO!';
                        copyBtn.classList.replace('bg-emerald-600', 'bg-gray-800');
                        copyBtn.classList.replace('hover:bg-emerald-700', 'hover:bg-gray-900');
                        
                        setTimeout(() => {
                            copyBtn.innerText = originalText;
                            copyBtn.classList.replace('bg-gray-800', 'bg-emerald-600');
                            copyBtn.classList.replace('hover:bg-gray-900', 'hover:bg-emerald-700');
                        }, 2000);
                    } catch (err) {
                        copyBtn.innerText = 'ERROR (USA DESCARGAR)';
                        setTimeout(() => copyBtn.innerText = originalText, 3000);
                    }
                }, 'image/png');
            } catch (err) {
                copyBtn.innerText = 'NAVEGADOR NO SOPORTADO';
                setTimeout(() => copyBtn.innerText = originalText, 3000);
            }
        };

        downloadBtn.onclick = () => {
            const link = document.createElement('a');
            link.download = `ArelyShop_${Date.now()}.jpg`;
            link.href = renderCanvas.toDataURL('image/jpeg', 0.95);
            link.click();
        };
        searchInput.oninput = applyFilters;
        categoryFilter.onchange = applyFilters;
        stockFilter.onchange = applyFilters;
    </script>
</body>
</html>
